<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pesanan — Toko Kue Tatang</title>
    <meta name="description" content="Lihat semua riwayat pesanan kue Anda di Toko Kue Tatang.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-body">

    <!-- Navbar -->
    <header>
        <div class="navbar container">
            <a href="index.html" class="logo" style="text-decoration:none; color:inherit;">
                <i class="fa-solid fa-cake-candles"></i>
                <h1>Toko Kue Tatang</h1>
            </a>
            <div style="display:flex; gap:12px; align-items:center;">
                <a href="index.html" class="nav-link-btn"><i class="fa-solid fa-shop"></i> Toko</a>
                <div class="user-nav-area" id="user-nav-area"></div>
            </div>
        </div>
    </header>

    <main class="history-main container">
        <div class="history-header">
            <h2 class="page-title"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Pesanan</h2>
            <p class="history-subtitle">Pantau semua pesanan kue Anda di sini</p>
        </div>

        <!-- Filter Tab -->
        <div class="history-tabs" id="history-tabs">
            <button class="hist-tab active" data-status="semua" onclick="filterOrders('semua', this)">Semua</button>
            <button class="hist-tab" data-status="Menunggu Pembayaran" onclick="filterOrders('Menunggu Pembayaran', this)">
                <i class="fa-solid fa-clock"></i> Butuh Bayar
            </button>
            <button class="hist-tab" data-status="Diproses" onclick="filterOrders('Diproses', this)">
                <i class="fa-solid fa-gears"></i> Diproses
            </button>
            <button class="hist-tab" data-status="Dikirim" onclick="filterOrders('Dikirim', this)">
                <i class="fa-solid fa-truck"></i> Dikirim
            </button>
            <button class="hist-tab" data-status="Selesai" onclick="filterOrders('Selesai', this)">
                <i class="fa-solid fa-circle-check"></i> Selesai
            </button>
            <button class="hist-tab" data-status="Dibatalkan" onclick="filterOrders('Dibatalkan', this)">
                <i class="fa-solid fa-xmark"></i> Dibatalkan
            </button>
        </div>

        <!-- Order List -->
        <div class="history-list" id="history-list">
            <!-- Dinamis diisi dari JS -->
        </div>

        <!-- Empty State -->
        <div class="empty-history hidden" id="empty-history">
            <div class="empty-icon">
                <i class="fa-solid fa-box-open"></i>
            </div>
            <h3>Belum Ada Pesanan</h3>
            <p>Yuk mulai belanja kue lezat dari Toko Kue Tatang!</p>
            <a href="index.html" class="btn-shop-now">
                <i class="fa-solid fa-shop"></i> Mulai Belanja
            </a>
        </div>

    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Toko Kue Tatang. All Rights Reserved.</p>
        </div>
    </footer>

    <div id="toast-container" class="toast-container"></div>
    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script src="history.js"></script>
</body>
</html>
